services:
     
  mysql:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p123456"]
      interval: 5s
      timeout: 5s
      retries: 10
    container_name: taskmanagement_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: TaskManagementDb
      MYSQL_USER: taskuser
      MYSQL_PASSWORD: taskpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/database-scripts.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - taskmanagement_network


  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanagement_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=mysql;Database=TaskManagementDb;User=taskuser;Password=taskpass;CharSet=utf8mb4
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - taskmanagement_network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: taskmanagement_frontend
    ports:
      - "3000:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - taskmanagement_network

volumes:
  mysql_data:

networks:
  taskmanagement_network:
    driver: bridge